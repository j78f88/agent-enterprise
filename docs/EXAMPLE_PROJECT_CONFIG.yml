# Example Project Configuration
#
# This is a FILLED-IN example showing real values for a React + TypeScript monorepo.
# Copy this to project.config.yml and adjust for your project.
#
# Run: python init.py --config project.config.yml

project:
  name: "Task Manager Pro"
  language: "TypeScript"
  framework: "React + Vite"
  locale: "en-US"
  namespace: "@taskmanager"

paths:
  # Sprint planning
  sprints: "sprints/"
  sprints_doc: "SPRINTS.md"
  web_app_dir: "apps/web"
  drafts: "docs/planning/drafts/"
  archive: "docs/archive/"
  validation: "docs/planning/validation/"
  research: "docs/planning/research/"
  handoffs: "docs/planning/_handoffs/"
  engagements: "docs/planning/engagements/"
  vision: "docs/planning/vision/"
  
  # Backlog files
  backlog_ledger: "docs/planning/BACKLOG_LEDGER.md"
  bug_backlog: "docs/planning/BUG_BACKLOG.md"
  bugs_screenshots: "docs/planning/bugs/screenshots/"
  rejections: "docs/planning/HANDOFF_REJECTIONS.md"
  non_goals: "docs/NON_GOALS.md"
  
  # Planning docs
  roadmap: "docs/planning/ROADMAP.md"
  feature_matrix: "docs/planning/FEATURE_MATRIX.md"
  
  # Architecture docs
  decisions: "docs/architecture/DECISIONS.md"
  future_considerations: "docs/architecture/FUTURE_CONSIDERATIONS.md"
  design_reviews: "docs/architecture/design-reviews/"
  architecture_doc: "docs/development/ARCHITECTURE.md"
  
  # Development docs
  technical_debt: "docs/development/TECHNICAL_DEBT.md"
  testing_doc: "docs/development/TESTING.md"
  
  # User-facing docs
  user_guide: "docs/user/USER_GUIDE.md"
  releases: "docs/user/RELEASES.md"
  changelog: "docs/user/changelog.json"
  changelog_deploy_copy: "apps/web/public/changelog.json"
  package_json: "apps/web/package.json"
  
  # Agent tooling
  copilot_instructions: ".github/copilot-instructions.md"
  instructions_dir: ".github/instructions"
  memory_architecture: ".claude/memory/architecture.md"
  memory_conventions: ".claude/memory/conventions.md"

quality:
  # Code coverage thresholds (percentage) - @qa validates against these
  coverage_store_threshold: 85   # Backend/store layer minimum coverage
  coverage_web_threshold: 70     # Frontend/UI layer minimum coverage
  
  # E2E regression tolerance - max failed tests before blocking
  e2e_regression_threshold: 3    # If >3 E2E tests fail, sprint blocks
  
  # Bundle size alerts (kilobytes) - @perf checks against these
  bundle_warning_kb: 150         # Warning threshold for bundle size
  bundle_critical_kb: 400        # Critical threshold - blocks if exceeded
  
  # Build performance (seconds)
  build_warning_seconds: 45      # Warn if build takes >45 seconds

platform:
  type: "vercel"
  test_workflow: "preview.yml"
  prod_workflow: "production.yml"
  ci_workflow_display_name: "Vercel Preview"
  test_url: "https://taskmanager-preview.vercel.app"
  prod_url: "https://taskmanager.app"
  e2e_runner: "playwright"

git:
  main_branch: "main"
  develop_branch: "develop"

ids:
  # Prefixes for generated IDs in planning documents
  bug_prefix: "BUG"              # Bug IDs: BUG-001, BUG-002...
  item_prefix: "TM"              # Backlog item IDs: TM-001, TM-002...
  rejection_prefix: "REJ"        # Rejection IDs: REJ-001, REJ-002...
  engagement_prefix: "ENG"       # Engagement IDs: ENG-001, ENG-002...
  adr_prefix: "ADR"              # Architecture Decision Record IDs

escalation:
  # Defect thresholds - how many defects trigger escalation
  def_p0_threshold: 3            # Escalate if ≥3 P0 bugs exist
  def_kill_threshold: 5          # Kill sprint if ≥5 critical defects
  
  # Sprint age limits (number of sprints)
  age_stale_sprints: 8           # Mark sprint stale if inactive for 8 sprints
  
  # Technical debt tracking
  debt_warning_sprints: 2        # Warn if debt unaddressed for 2 sprints
  debt_escalate_sprints: 4       # Escalate if debt unaddressed for 4 sprints
  debt_warning_items: 15         # Warn if ≥15 debt items exist
  debt_escalate_items: 30        # Escalate if ≥30 debt items exist
  debt_min_allocation_percent: 25  # Minimum % of sprint capacity for debt
  
  # Sprint composition constraints
  sprint_size_min: 4             # Minimum items per sprint
  sprint_size_max: 7             # Maximum items per sprint
  feature_cap_percent: 65        # Max % of sprint allocated to features
  p0_overflow_percent: 40        # Allow P0s to overflow feature cap by this %

scope_upgrade:
  task_count: 4
  files_affected: 10

commands:
  install: "pnpm install"
  dev: "pnpm dev"
  test: "pnpm test"
  typecheck: "pnpm typecheck"
  lint: "pnpm lint"
  build: "pnpm build"
  e2e: "pnpm test:e2e"
  coverage: "pnpm test:coverage"
  coverage_store: "pnpm --filter @taskmanager/store test:coverage"
  coverage_web: "pnpm --filter @taskmanager/web test:coverage"
  depcheck: "npx depcheck --json"
  timestamp: "date -u +\"%Y-%m-%dT%H:%M:%SZ\""

team:
  cto_name: "Alex Chen"

security:
  audit_log_enabled: true
  audit_log_path: ".agent-state/security-audit.jsonl"
  secret_scanning: true
  command_whitelist_enforced: true
  path_validation: true
  sandbox_enabled: false
  supply_chain_verification: false

observability:
  enabled: true
  backend: "none"
  endpoint: ""
  sample_rate: 1.0
  log_level: "info"
  event_log_path: ".agent-state/events.jsonl"
  cost_tracking: false
  metrics_port: 9090
  session_replay: false
  flame_graphs: false

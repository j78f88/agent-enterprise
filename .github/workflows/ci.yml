name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Build all profile configs
        run: |
          for profile in profiles/*.config.yml; do
            echo "::group::python init.py --config $profile"
            python init.py --config "$profile"
            echo "::endgroup::"
          done

      - name: Build example config per editor.target
        run: |
          for target in vscode claude-code cursor codex; do
            echo "::group::python init.py --config /tmp/target-$target.yml (editor.target=$target)"
            python - "$target" <<'EOF'
          import sys
          import yaml

          target = sys.argv[1]
          with open("config/project.config.example.yml") as f:
              config = yaml.safe_load(f)
          config["editor"]["target"] = target
          with open(f"/tmp/target-{target}.yml", "w") as f:
              yaml.safe_dump(config, f, sort_keys=False)
          EOF
            python init.py --config "/tmp/target-$target.yml"
            echo "::endgroup::"
          done

      # ITEM-021: the canonical example-config build runs LAST so the
      # post-build guardrail steps below validate the canonical tree,
      # not the last profile/target build.
      - name: Build resolved/ artifacts (canonical)
        run: python init.py --config config/project.config.example.yml

      - name: Check for unresolved tokens in .github/ tree
        run: python scripts/check_tokens.py

      - name: Check for canonical build command in docs
        run: python scripts/check_build_command.py

      - name: Run full test suite
        run: pytest tests/ -v

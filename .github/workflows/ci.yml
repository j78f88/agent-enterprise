name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run init.py tests
        run: pytest tests/test_init.py -v

      - name: Run contract tests
        run: pytest tests/test_contracts.py -v

      - name: Run Phase 4 tests
        run: python tests/test_phase4.py

      - name: Run Phase 2 tests (collect only — requires SQLite fixtures)
        run: pytest tests/test_phase2.py --collect-only || true

      - name: Run Phase 3 tests (skip Docker-dependent)
        run: pytest tests/test_phase3.py -v -m "not docker" || true

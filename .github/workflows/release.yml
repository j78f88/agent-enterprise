name: release

# Full smoke matrix on PRs touching release-critical paths,
# on every push to main, and on every tag push.
#
# Each job runs the canonical install/verify script
# (scripts/smoke-test.{sh,ps1}), which performs:
#   - pip install -r requirements{,-dev}.txt
#   - python init.py --config <profile>  (twice; determinism gate)
#   - python -m pytest

on:
  push:
    branches: [main]
    tags: ["**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  smoke:
    name: smoke (${{ matrix.os }} / py${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5.6.0
        with:
          python-version: ${{ matrix.python }}

      - name: Smoke test (Linux)
        if: runner.os == 'Linux'
        run: |
          chmod +x scripts/smoke-test.sh
          ./scripts/smoke-test.sh

      - name: Smoke test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./scripts/smoke-test.ps1

  commit-message-hygiene:
    name: commit-message-hygiene
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0
      - name: Reject BOM and check Conventional Commits prefix
        run: |
          chmod +x .githooks/commit-msg
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          fail=0
          for sha in $(git rev-list "$base..$head"); do
            msg=$(git log -1 --format=%B "$sha")
            tmp=$(mktemp)
            printf '%s' "$msg" > "$tmp"
            if ! .githooks/commit-msg "$tmp"; then
              echo "::error::Commit $sha rejected by .githooks/commit-msg"
              fail=1
            fi
            rm -f "$tmp"
          done
          exit $fail

# project.config.yml — agent-enterprise
# Run: python init.py --config config/project.config.yml

setup_complete: true

editor:
  target: "all"                     # dogfood every platform surface (vscode + claude-code + cursor + codex)

project:
  name: "agent-enterprise"
  language: "Python"
  framework: "Custom (init.py + PyYAML)"
  locale: "en-AU"
  namespace: ""                     # No monorepo namespace

paths:
  # Sprint planning
  sprints: "sprints/"
  sprints_doc: "SPRINTS.md"
  web_app_dir: ""                   # No web app — not applicable
  drafts: "docs/planning/drafts/"
  archive: "docs/archive/"
  validation: "docs/planning/validation/"
  research: "docs/planning/research/"
  handoffs: "docs/planning/_handoffs/"
  engagements: "docs/planning/engagements/"
  vision: "docs/planning/vision/"
  # Backlog files
  backlog_ledger: "docs/planning/BACKLOG_LEDGER.md"
  bug_backlog: "docs/planning/BUG_BACKLOG.md"
  bugs_screenshots: "docs/planning/bugs/screenshots/"
  rejections: "docs/planning/HANDOFF_REJECTIONS.md"
  non_goals: "docs/NON_GOALS.md"
  # Planning docs
  roadmap: "docs/planning/ROADMAP.md"
  feature_matrix: "docs/planning/FEATURE_MATRIX.md"
  # Architecture docs
  decisions: "docs/decisions/DECISIONS.md"
  future_considerations: "docs/decisions/FUTURE_CONSIDERATIONS.md"
  design_reviews: "docs/decisions/design-reviews/"
  architecture_doc: "docs/ARCHITECTURE.md"
  # Development docs
  technical_debt: "docs/TECHNICAL_DEBT.md"
  testing_doc: "docs/TESTING.md"
  # User-facing docs
  user_guide: "docs/USER_GUIDE.md"
  releases: "docs/RELEASES.md"
  changelog: "docs/changelog.json"
  changelog_deploy_copy: "docs/changelog.json"    # No deploy copy needed
  package_json: "pyproject.toml"                   # Version lives here if created
  # Security docs
  security_changelog: "docs/security/SECURITY_CHANGELOG.md"
  file_hashes: "docs/security/FILE_HASHES.md"
  security_reports: "docs/security/reports/"
  sbom_output: "docs/security/sbom.json"
  # Agent tooling
  copilot_instructions: ".github/copilot-instructions.md"
  instructions_dir: ".github/instructions"
  skills_deploy_dir: ".github/agents/"
  claude_commands: ".claude/commands"          # Claude Code slash-command directory
  claude_agents: ".claude/agents"              # Claude Code native subagent directory (seeded for claude-code/both/all targets)
  cursor_commands: ".cursor/commands"          # Cursor command directory (one .md per agent; seeded for cursor/all targets)
  codex_agents_md: "AGENTS.md"                 # Codex AGENTS.md — managed block merged between agent-enterprise markers (codex/all targets)
  memory_architecture: ".claude/memory/architecture.md"
  memory_conventions: ".claude/memory/conventions.md"

quality:
  coverage_store_threshold: 80
  coverage_web_threshold: 0         # No web components
  e2e_regression_threshold: 5
  bundle_warning_kb: 0              # Not applicable — Python project
  bundle_critical_kb: 0             # Not applicable — Python project
  build_warning_seconds: 30

platform:
  type: "none"                      # CLI tool, not a deployed app
  test_workflow: "ci.yml"
  prod_workflow: "ci.yml"
  ci_workflow_display_name: "Python CI"
  test_url: ""
  prod_url: ""
  e2e_runner: "pytest"

git:
  main_branch: "main"
  develop_branch: "develop"
  repo: "j78f88/agent-enterprise"

team:
  cto_name: "josh"

ids:
  bug_prefix: "BUG"
  item_prefix: "ITEM"
  rejection_prefix: "REJ"
  engagement_prefix: "ENG"
  adr_prefix: "ADR"

scope_upgrade:
  task_count: 3
  files_affected: 8

commands:
  install: "pip install -r requirements.txt"
  dev: ""
  test: "python -m pytest tests/ -v"
  typecheck: ""
  lint: ""
  build: "python init.py --config config/project.config.example.yml"
  e2e: "python -m pytest tests/ -v"
  coverage: "python -m pytest tests/ --cov=. -v"
  coverage_store: "python -m pytest tests/ --cov=. -v"
  coverage_web: ""
  depcheck: ""
  sbom_generate: "syft . -o cyclonedx-json"
  sast: ""
  secret_scan_history: "gitleaks detect --source . --verbose --report-format json"
  license_check: "pip-licenses --format=json"
  container_scan: ""                # Not applicable — no container images
  iac_scan: ""                      # Not applicable — no IaC in this project
  # Cross-platform ISO timestamp — used by @sprint-lead for phase timing.
  timestamp: "date -u +\"%Y-%m-%dT%H:%M:%SZ\""

escalation:
  def_p0_threshold: 3
  def_kill_threshold: 5
  age_stale_sprints: 10
  debt_warning_sprints: 3
  debt_escalate_sprints: 5
  debt_warning_items: 20
  debt_escalate_items: 40
  debt_min_allocation_percent: 30
  sprint_size_min: 5
  sprint_size_max: 8
  feature_cap_percent: 70
  p0_overflow_percent: 50

security:
  sbom_format: "cyclonedx"            # cyclonedx | spdx
  tracked_files: []                   # Additional files to track in hash registry (beyond defaults)
  license_gate: false                 # If true, denied license = gate FAIL (default: WARNING only)
  license_denylist: ["GPL-3.0-only", "AGPL-3.0-only", "SSPL-1.0"]
  license_allowlist: ["MIT", "Apache-2.0", "BSD-2-Clause", "BSD-3-Clause", "ISC", "0BSD"]
  audit_on_sprint: true               # Include @security as a sprint quality gate
  cvss_critical_threshold: 9.0        # CVSS score >= this → CRITICAL
  cvss_warning_threshold: 7.0         # CVSS score >= this → WARNING
  cisa_kev_check: true                # Cross-reference CISA Known Exploited Vulnerabilities catalog
  sec_id_prefix: "SEC"                # Prefix for security changelog entry IDs
  scan_git_history: true              # Scan full git history for previously committed secrets
  sast_tool: "semgrep"                # semgrep | bandit | eslint-security | codeql
  iac_scanner: "checkov"              # checkov | kics | trivy-config
  check_security_headers: false       # Not applicable — no web frontend
